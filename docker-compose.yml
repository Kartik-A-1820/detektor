version: "3.9"

x-detektor-service: &detektor-service
  build:
    context: .
    dockerfile: Dockerfile
  image: detektor:latest
  ports:
    - "8000:8000"
  environment:
    DETEKTOR_WEIGHTS: /artifacts/model.pt
    DETEKTOR_DEVICE: cpu
    DETEKTOR_HOST: 0.0.0.0
    DETEKTOR_PORT: 8000
    DETEKTOR_CONF_THRESH: 0.25
    DETEKTOR_IOU_THRESH: 0.6
    DETEKTOR_MAX_DET: 100
  volumes:
    - ./artifacts:/artifacts:ro
  healthcheck:
    test: ["CMD", "curl", "-f", "http://localhost:8000/ready"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 20s
  restart: unless-stopped

services:
  detektor-api:
    <<: *detektor-service

  detektor-api-gpu:
    <<: *detektor-service
    environment:
      DETEKTOR_WEIGHTS: /artifacts/model.pt
      DETEKTOR_DEVICE: cuda
      DETEKTOR_HOST: 0.0.0.0
      DETEKTOR_PORT: 8000
      DETEKTOR_CONF_THRESH: 0.25
      DETEKTOR_IOU_THRESH: 0.6
      DETEKTOR_MAX_DET: 100
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    runtime: nvidia
